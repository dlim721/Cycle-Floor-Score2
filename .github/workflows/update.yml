name: update-data

on:
  schedule:
    - cron: '0 8 * * *'        # every day at 08:00 UTC
  workflow_dispatch: {}         # adds a manual "Run workflow" button

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch metrics
        env:
          BG_API_KEY: ${{ secrets.BG_API_KEY }}
        run: python fetch_metrics.py

      - name: Commit updated data
        run: |
          git config user.name  "cfp-bot"
          git config user.email "cfp-bot@users.noreply.github.com"
          git add data.json
          git commit -m "update data $(date -u +%FT%TZ)" || echo "no changes to commit"
          git push

